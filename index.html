<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exam Questions</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    [x-cloak] { display: none !important; }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card-anim { animation: slideUp 0.18s ease-out; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { animation: spin 0.8s linear infinite; }
    select option { background: white; color: #1e293b; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen" x-data="app()" x-init="init()">

  <!-- ───── HEADER ───── -->
  <header class="bg-gradient-to-r from-indigo-600 to-violet-600 text-white shadow-lg">
    <div class="max-w-3xl mx-auto px-4 py-5 flex items-center justify-between gap-2">
      <div class="min-w-0">
        <h1 class="text-xl font-bold tracking-tight truncate" x-text="t('appTitle')"></h1>
        <p class="text-indigo-200 text-xs mt-0.5">
          <span x-text="questions.length"></span> <span x-text="t('questions')"></span> &middot;
          <span x-text="materie.length"></span> <span x-text="materie.length === 1 ? t('subject') : t('subjects')"></span>
        </p>
      </div>
      <div class="flex items-center gap-2 flex-shrink-0">
        <!-- Language selector -->
        <div class="relative flex items-center">
          <select x-model="lang" @change="saveLang()"
            class="appearance-none bg-white/10 hover:bg-white/20 border border-white/30 text-white text-xs font-semibold rounded-lg pl-2 pr-5 py-1.5 cursor-pointer focus:outline-none transition-colors">
            <option value="it">🇮🇹 IT</option>
            <option value="en">🇬🇧 EN</option>
            <option value="es">🇪🇸 ES</option>
            <option value="fr">🇫🇷 FR</option>
            <option value="de">🇩🇪 DE</option>
            <option value="pt">🇵🇹 PT</option>
          </select>
          <span class="absolute right-1.5 text-white/60 text-xs pointer-events-none">▾</span>
        </div>
        <!-- Name badge -->
        <button @click="openNameModal()"
          class="flex items-center gap-1.5 text-sm transition-all border border-white/30 rounded-xl px-3 py-1.5"
          :class="myNome ? 'bg-white/10 hover:bg-white/20' : 'bg-yellow-400/20 hover:bg-yellow-400/30 border-yellow-300/50'">
          <span x-text="myNome ? '👤' : '⚠️'"></span>
          <span class="font-medium hidden sm:inline max-w-24 truncate" x-text="myNome || t('setName')"></span>
          <span class="opacity-50 text-xs hidden sm:inline">✏️</span>
        </button>
        <!-- Add button -->
        <button @click="openModal()"
          class="bg-white/20 hover:bg-white/30 text-white font-semibold px-4 py-1.5 rounded-xl text-sm transition-all border border-white/30 shadow whitespace-nowrap">
          <span x-text="t('add')"></span>
        </button>
      </div>
    </div>
  </header>

  <!-- ───── FILTERS ───── -->
  <div class="max-w-3xl mx-auto px-4 pt-4 pb-3">
    <input x-model="search" type="text" :placeholder="t('searchPlaceholder')"
      class="w-full border border-slate-200 bg-white rounded-xl px-4 py-2.5 text-sm shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 mb-3">
    <div class="flex gap-2 flex-wrap">
      <button @click="filterMateria = ''"
        :class="filterMateria === '' ? 'bg-indigo-600 text-white shadow' : 'bg-white text-slate-600 border border-slate-200 hover:border-indigo-300'"
        class="px-3 py-1.5 rounded-full text-xs font-medium transition-all" x-text="t('all')">
      </button>
      <template x-for="m in materie" :key="m">
        <button @click="filterMateria = filterMateria === m ? '' : m"
          :style="filterMateria === m ? `background:${color(m)};color:#fff` : `border-color:${color(m)}44`"
          :class="filterMateria !== m ? 'bg-white text-slate-700' : ''"
          class="px-3 py-1.5 rounded-full text-xs font-medium border transition-all">
          <span x-text="m"></span>
          <span class="ml-1 opacity-70" x-text="`(${questions.filter(q=>q.materia===m).length})`"></span>
        </button>
      </template>
    </div>
  </div>

  <!-- ───── QUESTION LIST ───── -->
  <main class="max-w-3xl mx-auto px-4 pb-16">

    <!-- Loading -->
    <div x-show="loading" class="flex flex-col items-center py-20 text-slate-400 gap-3">
      <svg class="spinner w-8 h-8 text-indigo-500" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
      </svg>
      <span class="text-sm" x-text="t('loading')"></span>
    </div>

    <!-- Empty -->
    <div x-show="!loading && filteredQuestions.length === 0" class="text-center py-20 text-slate-400">
      <div class="text-5xl mb-3">🎓</div>
      <p class="font-medium text-slate-500" x-text="questions.length === 0 ? t('noQuestions') : t('noResults')"></p>
      <p class="text-sm mt-1" x-show="questions.length === 0" x-text="t('beFirst')"></p>
    </div>

    <!-- Cards -->
    <div class="space-y-3" x-show="!loading">
      <template x-for="q in filteredQuestions" :key="q.id">
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden card-anim hover:shadow-md transition-shadow">
          <div class="h-1" :style="`background:${color(q.materia)}`"></div>
          <div class="p-4">
            <div class="flex items-start justify-between gap-2 mb-2">
              <div class="flex items-center gap-2 flex-wrap">
                <span class="text-xs font-semibold px-2.5 py-1 rounded-full text-white"
                      :style="`background:${color(q.materia)}`" x-text="q.materia"></span>
                <span x-show="q.sessione" class="text-xs text-slate-400" x-text="`📅 ${q.sessione}`"></span>
                <span class="text-xs text-slate-400" x-text="`👤 ${q.nome}`"></span>
              </div>
              <div class="flex items-center gap-2 flex-shrink-0">
                <span class="text-xs text-slate-300" x-text="formatDate(q.timestamp)"></span>
                <button x-show="myNome && q.nome === myNome"
                  @click="confirmDelete(q)"
                  class="text-slate-300 hover:text-red-400 transition-colors text-sm leading-none"
                  :title="t('delete')">✕</button>
              </div>
            </div>
            <p class="text-slate-800 font-medium leading-snug" x-text="q.domanda"></p>
            <div x-show="q.risposta" class="mt-3">
              <button @click="q._open = !q._open"
                class="text-xs font-medium transition-colors flex items-center gap-1"
                :style="`color:${color(q.materia)}`"
                x-text="q._open ? t('hideAnswer') : t('showAnswer')">
              </button>
              <div x-show="q._open"
                x-transition:enter="transition ease-out duration-150"
                x-transition:enter-start="opacity-0 -translate-y-1"
                x-transition:enter-end="opacity-100 translate-y-0"
                class="mt-2 p-3 bg-slate-50 rounded-xl text-sm text-slate-600 leading-relaxed border-l-2"
                :style="`border-color:${color(q.materia)}88`">
                <span x-text="q.risposta"></span>
              </div>
            </div>
          </div>
        </div>
      </template>
    </div>
  </main>

  <!-- ───── ADD MODAL ───── -->
  <div x-show="showModal" x-cloak
    class="fixed inset-0 z-50 flex items-end sm:items-center justify-center p-4"
    style="background:rgba(0,0,0,0.45)">
    <div @click.outside="showModal = false" class="bg-white w-full max-w-lg rounded-2xl shadow-2xl p-6">
      <h2 class="text-base font-bold text-slate-800 mb-4" x-text="t('newQuestion')"></h2>
      <form @submit.prevent="submitQuestion()">
        <div class="mb-3">
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5" x-text="t('subjectLabel')"></label>
          <input x-model="form.materia" list="materie-list" type="text" required
            :placeholder="t('subjectPlaceholder')"
            class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
          <datalist id="materie-list">
            <template x-for="m in materie" :key="m"><option :value="m"></option></template>
          </datalist>
        </div>
        <div class="mb-3">
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5" x-text="t('questionLabel')"></label>
          <textarea x-model="form.domanda" required rows="3"
            :placeholder="t('questionPlaceholder')"
            class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 resize-none"></textarea>
        </div>
        <div class="mb-3">
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">
            <span x-text="t('answerLabel')"></span>
            <span class="font-normal text-slate-400 normal-case ml-1" x-text="t('optional')"></span>
          </label>
          <textarea x-model="form.risposta" rows="2"
            :placeholder="t('answerPlaceholder')"
            class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 resize-none"></textarea>
        </div>
        <div class="grid grid-cols-2 gap-3 mb-5">
          <div>
            <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5" x-text="t('sessionLabel')"></label>
            <input x-model="form.sessione" type="text" :placeholder="t('sessionPlaceholder')"
              class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5" x-text="t('nameLabel')"></label>
            <input x-model="form.nome" type="text" :placeholder="t('namePlaceholder')"
              class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
          </div>
        </div>
        <div class="flex gap-3">
          <button type="button" @click="showModal = false"
            class="flex-1 border border-slate-200 text-slate-600 font-semibold py-2.5 rounded-xl hover:bg-slate-50 transition-colors text-sm"
            x-text="t('cancel')">
          </button>
          <button type="submit" :disabled="submitting"
            class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 rounded-xl transition-colors text-sm disabled:opacity-50 flex items-center justify-center gap-2">
            <svg x-show="submitting" class="spinner w-4 h-4" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
            </svg>
            <span x-text="submitting ? t('saving') : t('saveQuestion')"></span>
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- ───── DELETE CONFIRM ───── -->
  <div x-show="deleteTarget" x-cloak
    class="fixed inset-0 z-50 flex items-center justify-center p-4"
    style="background:rgba(0,0,0,0.45)">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-6 text-center">
      <div class="text-4xl mb-3">🗑️</div>
      <p class="font-semibold text-slate-700 mb-1" x-text="t('deleteConfirm')"></p>
      <p class="text-sm text-slate-400 mb-5 line-clamp-2" x-text="deleteTarget?.domanda"></p>
      <div class="flex gap-3">
        <button @click="deleteTarget = null"
          class="flex-1 border border-slate-200 text-slate-600 font-medium py-2.5 rounded-xl hover:bg-slate-50 text-sm"
          x-text="t('cancel')">
        </button>
        <button @click="doDelete()"
          class="flex-1 bg-red-500 hover:bg-red-600 text-white font-medium py-2.5 rounded-xl text-sm transition-colors"
          x-text="t('delete')">
        </button>
      </div>
    </div>
  </div>

  <!-- ───── NAME MODAL ───── -->
  <div x-show="showNameModal" x-cloak
    class="fixed inset-0 z-50 flex items-center justify-center p-4"
    style="background:rgba(0,0,0,0.45)">
    <div @click.outside="showNameModal = false" class="bg-white w-full max-w-sm rounded-2xl shadow-2xl p-6">
      <h2 class="text-base font-bold text-slate-800 mb-1" x-text="t('yourName')"></h2>
      <p class="text-xs text-slate-400 mb-4" x-text="t('nameDescription')"></p>
      <input x-model="nameInput" @keydown.enter="saveName()" type="text"
        :placeholder="t('namePlaceholder')"
        class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 mb-4">
      <div class="flex gap-3">
        <button @click="showNameModal = false"
          class="flex-1 border border-slate-200 text-slate-600 font-medium py-2.5 rounded-xl hover:bg-slate-50 text-sm"
          x-text="t('cancel')">
        </button>
        <button @click="saveName()"
          class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 rounded-xl text-sm transition-colors"
          x-text="t('saveName')">
        </button>
      </div>
    </div>
  </div>

    const PALETTE = [
      '#4F46E5','#7C3AED','#DB2777','#DC2626','#EA580C',
      '#D97706','#65A30D','#059669','#0891B2','#0284C7',
      '#8B5CF6','#EC4899','#F97316','#14B8A6','#6366F1'
    ];
    const colorMap = {};
    let ci = 0;
    function color(m) {
      if (!colorMap[m]) colorMap[m] = PALETTE[ci++ % PALETTE.length];
      return colorMap[m];
    }

    const LOCALE_MAP = { it:'it-IT', en:'en-US', es:'es-ES', fr:'fr-FR', de:'de-DE', pt:'pt-PT' };

    function app() {
      return {
        questions: [],
        loading: true,
        search: '',
        filterMateria: '',
        showModal: false,
        showNameModal: false,
        submitting: false,
        deleteTarget: null,
        lang: 'en',
        myNome: localStorage.getItem('esame_nome') || '',
        nameInput: localStorage.getItem('esame_nome') || '',
        form: { materia:'', domanda:'', risposta:'', sessione:'', nome:'' },

        get materie() {
          return [...new Set(this.questions.map(q => q.materia).filter(Boolean))].sort();
        },

        get filteredQuestions() {
          const s = this.search.toLowerCase();
          return this.questions.filter(q => {
            const matchSearch = !s ||
              q.domanda.toLowerCase().includes(s) ||
              q.risposta.toLowerCase().includes(s) ||
              q.materia.toLowerCase().includes(s);
            const matchMateria = !this.filterMateria || q.materia === this.filterMateria;
            return matchSearch && matchMateria;
          });
        },

        t(key) {
          return LANGS[this.lang]?.[key] ?? LANGS['en'][key] ?? key;
        },

        color(m) { return color(m); },

        formatDate(iso) {
          if (!iso) return '';
          return new Date(iso).toLocaleDateString(LOCALE_MAP[this.lang] || 'en-US', {
            day: '2-digit', month: '2-digit', year: 'numeric'
          });
        },

        saveLang() {
          localStorage.setItem('esame_lang', this.lang);
          document.title = this.t('appTitle');
        },

        init() {
          const savedLang = localStorage.getItem('esame_lang');
          if (savedLang && LANGS[savedLang]) {
            this.lang = savedLang;
          } else {
            const browser = navigator.language.slice(0, 2).toLowerCase();
            this.lang = LANGS[browser] ? browser : 'en';
          }
          document.title = this.t('appTitle');

          const savedName = localStorage.getItem('esame_nome') || '';
          this.myNome = savedName;
          this.nameInput = savedName;
          this.form.nome = savedName;
          if (!savedName) this.showNameModal = true;

          this.loadQuestions();
        },

        openModal() {
          this.form.materia = '';
          this.form.domanda = '';
          this.form.risposta = '';
          this.form.sessione = '';
          this.showModal = true;
        },

        openNameModal() {
          this.nameInput = this.myNome;
          this.showNameModal = true;
        },

        saveName() {
          const n = this.nameInput.trim();
          if (!n) return;
          this.myNome = n;
          this.form.nome = n;
          localStorage.setItem('esame_nome', n);
          this.showNameModal = false;
        },

        loadQuestions() {
          this.loading = true;
          google.script.run
            .withSuccessHandler(data => {
              this.questions = data.map(q => ({ ...q, _open: false }));
              this.loading = false;
            })
            .withFailureHandler(() => { this.loading = false; })
            .getQuestions();
        },

        submitQuestion() {
          if (!this.form.materia.trim() || !this.form.domanda.trim()) return;
          this.submitting = true;
          if (this.form.nome) {
            this.myNome = this.form.nome;
            localStorage.setItem('esame_nome', this.form.nome);
          }
          google.script.run
            .withSuccessHandler(() => {
              this.submitting = false;
              this.showModal = false;
              this.loadQuestions();
            })
            .withFailureHandler(() => {
              this.submitting = false;
              alert(this.t('saveError'));
            })
            .addQuestion(this.form);
        },

        confirmDelete(q) { this.deleteTarget = q; },

        doDelete() {
          const id = this.deleteTarget.id;
          this.deleteTarget = null;
          google.script.run
            .withSuccessHandler(() => this.loadQuestions())
            .deleteQuestion(id);
        }
      };
    }
  </script>
</body>
</html>
